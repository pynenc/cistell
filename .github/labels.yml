# --- SemVer -----------------------------------------------------------
- name: major
  color: "D73A4A"
  description: "Major version bump"
- name: minor
  color: "0075CA"
  description: "Minor version bump"
- name: patch
  color: "CFD3D7"
  description: "Patch version bump"

# --- Conventional Commit Types ----------------------------------------
- name: feature
  color: "0E8A16"
  description: "New feature"
- name: fix
  color: "D73A4A"
  description: "Bug fix"
- name: docs
  color: "0075CA"
  description: "Documentation improvement"
- name: chore
  color: "FEF2C0"
  description: "Maintenance / tooling"
- name: refactor
  color: "FBCA04"
  description: "Code refactoring"
- name: security
  color: "B60205"
  description: "Security fix"
- name: dependencies
  color: "0366D6"
  description: "Dependency updates"
- name: breaking
  color: "B60205"
  description: "Breaking change"

# --- Release Drafter --------------------------------------------------
- name: skip-changelog
  color: "EEEEEE"
  description: "Exclude PR from release notes"

# --- Language ---------------------------------------------------------
- name: rust
  color: "DEA584"
  description: "Rust code"
- name: python
  color: "3572A5"
