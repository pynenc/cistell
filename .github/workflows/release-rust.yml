name: Release Rust

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check-version.outputs.tag != '' }}
      version: ${{ steps.check-version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check if there is a parent commit
        id: check-parent-commit
        run: |
          echo "sha=$(git rev-parse --verify --quiet HEAD^)" >> "$GITHUB_OUTPUT"

      - name: Detect and tag new version
        id: check-version
        if: steps.check-parent-commit.outputs.sha
        uses: salsify/action-detect-and-tag-new-version@b1778166f13188a9d478e2d1198f993011ba9864 # v2.0.3
        with:
          tag-template: "v{VERSION}"
          version-command: |
            grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2

  rust-release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.is_release == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          publish() {
            local crate="$1"
            local max_retries=3
            echo "Publishing $crate..."
            for attempt in $(seq 1 $max_retries); do
              output=$(cargo publish -p "$crate" --no-verify 2>&1) && {
                echo "$output"
                echo "✅ $crate published"
                sleep 30
                return 0
              }
              echo "$output"
              if echo "$output" | grep -q "already exists"; then
                echo "⏭️ $crate already published, skipping"
                return 0
              fi
              if echo "$output" | grep -q "429\|Too Many Requests"; then
                echo "⏳ Rate limited, waiting 5 minutes before retry ($attempt/$max_retries)..."
                sleep 300
              else
                echo "❌ $crate failed with unexpected error"
                return 1
              fi
            done
            echo "❌ $crate failed after $max_retries retries"
            return 1
          }

          # Layer 0: no internal deps
          publish cistell-macros

          # Layer 1: depends on macros
          publish cistell-core

      - name: Summary
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "### 🦀 Published to crates.io" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Crates published: cistell-macros, cistell-core" >> "$GITHUB_STEP_SUMMARY"
