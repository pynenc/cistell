name: Label and Validate PRs

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sync-labels:
    name: Sync Labels
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Sync Repository Labels
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          yaml-file: .github/labels.yml
          exclude: |
            help*
            *issue

  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    needs: sync-labels
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Apply PR Labels
        uses: bcoe/conventional-release-labels@886f696738527c7be444262c327c89436dfb95a8 # v1
        with:
          type_labels: |
            {
              "feat": "feature",
              "fix": "fix",
              "docs": "docs",
              "chore": "chore",
              "refactor": "refactor",
              "security": "security",
              "deps": "dependencies",
              "breaking": "breaking"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-labels:
    name: Validate Labels
    runs-on: ubuntu-latest
    needs: label-pr
    permissions:
      pull-requests: read
    steps:
      - name: Check for Conventional Commit Labels
        uses: danielchabr/pr-labels-checker@7145ecb81a69104f99767cb133bf856e749f7e73 # v3.3
        with:
          hasSome: feature,fix,docs,chore,refactor,security,dependencies,breaking
          githubToken: ${{ secrets.GITHUB_TOKEN }}
