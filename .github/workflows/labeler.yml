name: Label and Validate PRs

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - labeled
      - unlabeled

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-labels:
    name: Sync Labels
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Sync Repository Labels
        uses: crazy-max/ghaction-github-labeler@24d110aa46a59976b8a7f35518cb7f14f434c916 # v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          yaml-file: .github/labels.yml
          dry-run: ${{ github.event_name == 'pull_request' }}
          exclude: |
            help*
            *issue

  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    needs: sync-labels
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Apply PR Labels
        uses: bcoe/conventional-release-labels@b503ca473654e07521c051628c5f1f969e7436da # v1
        with:
          type_labels: |
            {
              "feat": "feature",
              "fix": "fix",
              "docs": "docs",
              "chore": "chore",
              "refactor": "refactor",
              "security": "security",
              "deps": "dependencies",
              "breaking": "breaking"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-labels:
    name: Validate Labels
    runs-on: ubuntu-latest
    needs: label-pr
    permissions:
      pull-requests: read
    steps:
      - name: Check for SemVer Labels
        uses: danielchabr/pr-labels-checker@e1d7e79aa0933af1728011705a30528a279874fd # v3.1
        with:
          hasSome: major,minor,patch
          githubToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Check for Conventional Commit Labels
        uses: danielchabr/pr-labels-checker@e1d7e79aa0933af1728011705a30528a279874fd # v3.1
        with:
          hasSome: feature,fix,docs,chore,refactor,security,dependencies,breaking
          githubToken: ${{ secrets.GITHUB_TOKEN }}
