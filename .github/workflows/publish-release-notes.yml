name: Publish Release Notes and Update Changelog

on:
  workflow_run:
    workflows:
      - Release Rust
      - Release Python
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-release-notes:
    name: Publish Release Notes
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release-notes
        uses: release-drafter/release-drafter@0d6b7075b8d71574def39dc7a447b46221abf038 # v5.23.0
        with:
          publish: true
          tag: v${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@a938690fad7edf25368f37e43a1ed1b34303eb36 # v1
        with:
          latest-version: ${{ steps.version.outputs.version }}
          release-notes: ${{ steps.release-notes.outputs.body }}

      - name: Commit Updated Changelog
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          branch: main
          commit_message: "docs(changelog): update changelog"
          file_pattern: CHANGELOG.md
