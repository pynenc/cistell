name: Release Python

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish destination"
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  # Python versions to build wheels for (space-separated).
  # Must stay within PyO3's supported range — currently ≤ 3.13 (pyo3 0.22).
  WHEEL_PYTHON_VERSIONS: "3.12 3.13"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      is_release: ${{ steps.check-version.outputs.tag != '' }}
      version: ${{ steps.compute-version.outputs.version }}
      tag: ${{ steps.check-version.outputs.tag }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Detect and tag new version
        id: check-version
        if: github.event_name == 'push'
        uses: salsify/action-detect-and-tag-new-version@e4e25f0bab8e458580a7bdaad885e7d6fcd697d6 # v2.0.1
        with:
          tag-template: "v{VERSION}"
          version-command: |
            grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2

      - name: Compute effective version
        id: compute-version
        run: |
          current_version=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
          if [[ "${{ steps.check-version.outputs.tag }}" != "" ]]; then
            echo "version=$current_version" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${current_version}-dev.$(date +%s)" >> "$GITHUB_OUTPUT"
          else
            echo "version=${current_version}-dev.$(date +%s)" >> "$GITHUB_OUTPUT"
          fi

  pr-version:
    name: PR Version
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      pep440_version: ${{ steps.set-version.outputs.pep440_version }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set PR version
        id: set-version
        run: |
          current_version=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
          pr_version="${current_version}-rc.${{ github.event.pull_request.number }}.dev.${{ github.run_number }}"
          echo "version=$pr_version" >> "$GITHUB_OUTPUT"
          # PEP 440 version for PyPI (e.g. 0.1.0rc24.dev8)
          pep440_version="${current_version}rc${{ github.event.pull_request.number }}.dev${{ github.run_number }}"
          echo "pep440_version=$pep440_version" >> "$GITHUB_OUTPUT"

  create-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    needs: [check-version, pr-version]
    if: always() && (needs.check-version.result == 'success' || needs.pr-version.result == 'success')
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Patch version for non-release builds
        if: >-
          (needs.check-version.result == 'success' && needs.check-version.outputs.is_release != 'true') ||
          needs.pr-version.result == 'success'
        run: |
          VERSION="${{ needs.pr-version.outputs.version || needs.check-version.outputs.version }}"
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "Patching workspace version $CURRENT → $VERSION"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          # Also patch workspace dependency versions so pre-release resolves
          sed -i.bak "s/version = \"$CURRENT\", path/version = \"=$VERSION\", path/g" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Create source distribution
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          command: sdist
          args: --out dist

      - name: Test sdist
        shell: bash
        run: |
          pip install --force-reinstall --verbose dist/*.tar.gz
          cd "$RUNNER_TEMP" && python -c 'import cistell'

      - name: Upload sdist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist-cistell
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [check-version, pr-version]
    if: always() && (needs.check-version.result == 'success' || needs.pr-version.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - os: macos-14
            target: x86_64-apple-darwin
            manylinux: "off"
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
          - os: windows-latest
            target: x86_64
            manylinux: "off"
    steps:
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Patch version for non-release builds
        if: >-
          (needs.check-version.result == 'success' && needs.check-version.outputs.is_release != 'true') ||
          needs.pr-version.result == 'success'
        shell: bash
        run: |
          VERSION="${{ needs.pr-version.outputs.version || needs.check-version.outputs.version }}"
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "Patching workspace version $CURRENT → $VERSION"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          # Also patch workspace dependency versions so pre-release resolves
          sed -i.bak "s/version = \"$CURRENT\", path/version = \"=$VERSION\", path/g" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Build wheel
        uses: PyO3/maturin-action@db323e2cf5679b7feb8bcb561a36b27a0bc19e79 # v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >
            --release
            --interpreter ${{ env.WHEEL_PYTHON_VERSIONS }}
            --out dist

      - name: Test wheel
        if: >
          !(matrix.target == 'aarch64' && runner.os == 'Linux' && runner.arch != 'ARM64') &&
          !(matrix.target == 'aarch64-apple-darwin' && runner.arch != 'ARM64') &&
          !(matrix.target == 'x86_64-apple-darwin' && runner.arch != 'X64')
        shell: bash
        run: |
          pip install cistell --no-index --find-links dist/ --force-reinstall
          cd "$RUNNER_TEMP" && python -c 'import cistell'

      - name: Upload wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish-to-pypi:
    name: Publish to PyPI
    needs: [check-version, create-sdist, build-wheels]
    if: >-
      needs.check-version.result == 'success' &&
      (
        needs.check-version.outputs.is_release == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download sdists and wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          verbose: true

      - name: Summary
        run: |
          echo "### 📦 Published to PyPI" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: \`${{ needs.check-version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [check-version, pr-version, create-sdist, build-wheels]
    if: >-
      always() &&
      needs.create-sdist.result == 'success' &&
      needs.build-wheels.result == 'success' &&
      (
        needs.pr-version.result == 'success' ||
        (needs.check-version.result == 'success' && needs.check-version.outputs.is_release != 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download sdists and wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*"
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          verbose: true

      - name: Summary
        run: |
          VERSION="${{ needs.pr-version.outputs.version || needs.check-version.outputs.version }}"
          echo "### 📦 Published to TestPyPI" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"

  pr-comment:
    name: Comment PR
    needs: [pr-version, publish-to-testpypi]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      needs.publish-to-testpypi.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const version = '${{ needs.pr-version.outputs.pep440_version }}';
            const body = [
              `📦 Published to [TestPyPI](https://test.pypi.org/project/cistell/${version}/)`,
              '',
              'Install with:',
              '```bash',
              `pip install --index-url https://test.pypi.org/simple/ cistell==${version}`,
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            })
