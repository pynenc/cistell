name: Bug Report
description: Report a bug in cistell
title: "[Bug]: "
labels: ["fix"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of cistell are you using?
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - Python
        - Rust
        - Both
    validations:
      required: true
