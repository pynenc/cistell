name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's Changed

  $CHANGES
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🔒 Security"
    labels:
      - "security"
  - title: "📖 Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "🧰 Maintenance"
    labels:
      - "chore"
      - "refactor"
      - "dependencies"
exclude-labels:
  - "skip-changelog"
version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
  patch:
    labels:
      - "patch"
  default: patch
sort-by: merged_at
sort-direction: descending
