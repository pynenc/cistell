# https://github.com/release-drafter/release-drafter
name-template: "v$RESOLVED_VERSION 馃寛"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "馃殌 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "馃悰 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "馃О Maintenance"
    label: "chore"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
  patch:
    labels:
      - "patch"
  default: patch
template: |
  ## Changes

  $CHANGES
